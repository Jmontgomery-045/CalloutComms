name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install app dependencies
        working-directory: packages/app
        run: npm install

      - name: Force reinstall native binaries for electron-builder
        working-directory: packages/app
        run: npm install 7zip-bin app-builder-bin --force

      - name: Build & publish
        working-directory: packages/app
        run: npm run dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SIGNAL_URL: ${{ secrets.VITE_SIGNAL_URL }}
          VITE_TURN_URLS: ${{ secrets.VITE_TURN_URLS }}
          VITE_TURN_USERNAME: ${{ secrets.VITE_TURN_USERNAME }}
          VITE_TURN_CREDENTIAL: ${{ secrets.VITE_TURN_CREDENTIAL }}

      - name: Add stable-named installer to release
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $src = Get-ChildItem "packages\app\dist\*.exe" | Where-Object { $_.Name -notlike "*.blockmap" } | Select-Object -First 1
          Copy-Item $src.FullName "packages\app\dist\callout-Setup.exe"
          gh release upload $env:GITHUB_REF_NAME "packages\app\dist\callout-Setup.exe" --clobber
